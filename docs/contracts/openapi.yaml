openapi: 3.1.0
info:
  title: Sift API
  version: 0.1.0
  summary: Post-v0 hosted API outline for Sift Pro
  description: |
    Post-v0 hosted API outline for Sift Pro.

    Canonical truth lives in typed JSON records.
    v0 local agent access is CLI-first.
    Human UI and Markdown projections are built on top of the same event layer.
    The hosted service is authenticated and read-only in its first premium slice.
    Registration and user identity are delegated to Zitadel.
servers:
  - url: https://api.sift.local
security:
  - ZitadelOIDC: []
paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is running
  /readyz:
    get:
      operationId: readinessCheck
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Service is ready to accept traffic
        "503":
          description: Service is not ready
  /v1/events:
    get:
      operationId: listEvents
      summary: List events
      description: |
        Cursor-based pagination is defined but not yet implemented.
        Passing a non-empty `cursor` value returns `400`.
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [crypto]
        - name: asset
          in: query
          schema:
            type: string
        - name: topic
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - single_source
              - multi_source_verified
              - official_source_confirmed
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          description: Reserved for future pagination. Not implemented; any non-empty value returns 400.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  next_cursor:
                    type: string
                    nullable: true
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
  /v1/events/{event_id}:
    get:
      operationId: getEvent
      summary: Get one event
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "401":
          description: Missing or invalid bearer token
        "404":
          description: Event not found
  /v1/digests/{scope}/{window}:
    get:
      operationId: getDigest
      summary: Get digest metadata
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
            examples: [crypto, btc, policy]
        - name: window
          in: path
          required: true
          schema:
            type: string
            examples: [24h, 7d, 30d]
      responses:
        "200":
          description: Digest metadata and links
          content:
            application/json:
              schema:
                type: object
                required: [scope, window, markdown_url, event_count]
                properties:
                  scope:
                    type: string
                  window:
                    type: string
                  markdown_url:
                    type: string
                  event_count:
                    type: integer
                  generated_at:
                    type: string
                    format: date-time
        "401":
          description: Missing or invalid bearer token
  /v1/ws:
    get:
      operationId: openUpdatesStream
      summary: Open authenticated updates stream
      description: |
        WebSocket upgrade endpoint for low-latency event and digest notifications.

        Stream messages are advisory. Clients should re-fetch canonical records
        over REST when full event truth is required.

        Non-browser clients may authenticate with `Authorization: Bearer <token>`.
        Browser clients should use `Sec-WebSocket-Protocol: sift.v1, bearer.<token>`
        so the server can validate the bearer token without exposing it in the URL.

        Frame types sent by the server:
        - `{"type": "connected"}` — initial handshake acknowledgement
        - `{"type": "event.upserted", "event_id": "..."}` — an event was created or updated
        - `{"type": "digest.updated", "scope": "...", "window": "..."}` — a digest was regenerated
      responses:
        "101":
          description: Switching protocols to WebSocket
        "401":
          description: Missing or invalid bearer token
components:
  securitySchemes:
    ZitadelOIDC:
      type: openIdConnect
      openIdConnectUrl: https://auth.10g.dev/.well-known/openid-configuration
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Event:
      type: object
      description: |
        See docs/contracts/event.schema.json for the canonical JSON Schema.
        This OpenAPI definition mirrors the canonical schema for tooling compatibility.
      required:
        - event_id
        - category
        - status
        - event_type
        - title
        - summary_1l
        - assets
        - topics
        - entities
        - published_at
        - updated_at
        - first_seen_at
        - last_verified_at
        - importance_score
        - confidence_score
        - source_cluster_size
        - supporting_articles
        - rights
      properties:
        event_id:
          type: string
          pattern: "^evt_[a-z0-9_]+$"
        category:
          type: string
          enum: [crypto]
        status:
          type: string
          enum:
            - single_source
            - multi_source_verified
            - official_source_confirmed
        event_type:
          type: string
        title:
          type: string
          minLength: 1
        summary_1l:
          type: string
          minLength: 1
        summary_5l:
          type: array
          items:
            type: string
          maxItems: 5
        assets:
          type: array
          items:
            type: string
        topics:
          type: array
          items:
            type: string
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        published_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        first_seen_at:
          type: string
          format: date-time
        last_verified_at:
          type: string
          format: date-time
        importance_score:
          type: number
          minimum: 0
          maximum: 1
        market_relevance_score:
          type: number
          minimum: 0
          maximum: 1
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        source_cluster_size:
          type: integer
          minimum: 1
        supporting_articles:
          type: array
          items:
            $ref: "#/components/schemas/SupportingArticle"
          minItems: 1
        rights:
          $ref: "#/components/schemas/Rights"
        markdown_url:
          type: string
    Entity:
      type: object
      required: [type, id, name]
      properties:
        type:
          type: string
          enum:
            - asset
            - protocol
            - exchange
            - regulator
            - person
            - company
            - region
        id:
          type: string
        name:
          type: string
    SupportingArticle:
      type: object
      required: [article_id, source, url, published_at, editorial_type]
      properties:
        article_id:
          type: string
        source:
          type: string
        url:
          type: string
          format: uri
        published_at:
          type: string
          format: date-time
        editorial_type:
          type: string
          enum:
            - report
            - analysis
            - opinion
            - press_release
            - sponsored
            - rumor
            - official_announcement
    Rights:
      type: object
      required: [storage_mode, full_text_stored, excerpt_allowed]
      properties:
        storage_mode:
          type: string
          enum:
            - metadata_only
            - metadata_plus_excerpt
            - metadata_plus_summary
            - full_text_allowed
        full_text_stored:
          type: boolean
        excerpt_allowed:
          type: boolean
